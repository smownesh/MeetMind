<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetMind — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --accent: #00e5a0; --accent2: #00b87a;
    --text: #f0f0ef; --muted: #6b6b6b; --muted2: #999;
    --danger: #ff4444;
    --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 40px 36px; width: 100%; max-width: 420px;
    position: relative; z-index: 1;
    animation: fadeUp 0.5s ease both;
  }

  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; justify-content: center; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .logo-name { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text); }
  .logo-name span { color: var(--accent); }

  .card-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: var(--muted2); text-align: center; margin-bottom: 28px; }

  .tabs { display: flex; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; border-radius: 7px; cursor: pointer; transition: all 0.15s; color: var(--muted2); border: none; background: transparent; font-family: var(--font-body); }
  .tab.active { background: var(--surface); color: var(--text); border: 1px solid var(--border2); }

  .btn-google {
    width: 100%; padding: 12px; border-radius: 10px;
    border: 1px solid var(--border2); background: var(--surface2);
    color: var(--text); font-family: var(--font-body); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 20px;
  }
  .btn-google:hover { border-color: var(--border2); background: #222; }

  .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted2); margin-bottom: 6px; font-family: var(--font-mono); }
  .field input {
    width: 100%; padding: 11px 14px; border-radius: 9px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input:focus { border-color: rgba(0,229,160,0.4); box-shadow: 0 0 0 3px rgba(0,229,160,0.06); }
  .field input::placeholder { color: var(--muted); }

  .btn-submit {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    background: var(--accent); color: #000; font-family: var(--font-display);
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-top: 4px;
  }
  .btn-submit:hover { background: var(--accent2); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg { font-size: 13px; border-radius: 9px; padding: 11px 14px; margin-top: 14px; display: none; font-family: var(--font-mono); line-height: 1.5; }
  .msg.error { display: block; background: rgba(255,68,68,0.06); border: 1px solid rgba(255,68,68,0.2); color: #ff7777; }
  .msg.success { display: block; background: rgba(0,229,160,0.06); border: 1px solid rgba(0,229,160,0.2); color: var(--accent); }

  .footer-link { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
  .footer-link a { color: var(--accent); text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">◈</div>
    <div class="logo-name">Meet<span>Mind</span></div>
  </div>

  <div class="card-title" id="card-title">Welcome back</div>
  <div class="card-sub" id="card-sub">Sign in to access your meeting history</div>

  <div class="tabs">
    <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
  </div>

  <button class="btn-google" onclick="signInWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">or</div>
    <div class="divider-line"></div>
  </div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@company.com" />
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />
  </div>

  <button class="btn-submit" id="submit-btn" onclick="handleSubmit()">Sign in</button>

  <div class="msg" id="msg"></div>

  <div class="footer-link">
    <a href="/">← Back to home</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://yhoybdeazaxyohfkyqbl.supabase.com';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlob3liZGVhemF4eW9oZmt5cWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTMwMjQsImV4cCI6MjA5MDEyOTAyNH0.K1kv6667oitGaogafbqan3vmK5zXw0J2ltSi6FGOGhM';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let mode = 'signin';

  // Redirect if already logged in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = '/app.html';
  });

  function switchTab(newMode) {
    mode = newMode;
    document.getElementById('tab-signin').className = 'tab' + (mode === 'signin' ? ' active' : '');
    document.getElementById('tab-signup').className = 'tab' + (mode === 'signup' ? ' active' : '');
    document.getElementById('card-title').textContent = mode === 'signin' ? 'Welcome back' : 'Create account';
    document.getElementById('card-sub').textContent = mode === 'signin' ? 'Sign in to access your meeting history' : 'Free account · No credit card needed';
    document.getElementById('submit-btn').textContent = mode === 'signin' ? 'Sign in' : 'Create account';
    clearMsg();
  }

  async function signInWithGoogle() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/app.html' }
    });
    if (error) showMsg(error.message, 'error');
  }

  async function handleSubmit() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submit-btn');

    if (!email || !password) { showMsg('Please fill in all fields.', 'error'); return; }
    if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = mode === 'signin' ? 'Signing in...' : 'Creating account...';
    clearMsg();

    if (mode === 'signin') {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) { showMsg(error.message, 'error'); btn.disabled = false; btn.textContent = 'Sign in'; }
      else window.location.href = '/app.html';
    } else {
      const { error } = await sb.auth.signUp({ email, password });
      if (error) { showMsg(error.message, 'error'); btn.disabled = false; btn.textContent = 'Create account'; }
      else showMsg('Account created! Check your email to confirm, then sign in.', 'success');
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function clearMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
